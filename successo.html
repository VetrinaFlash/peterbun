<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ordine Confermato - Peter Bun</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { 
            background: linear-gradient(135deg, #1a0f0f, #3e2723); 
            color: #f8f1e7; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center;
        }
        .card {
            background: rgba(62, 39, 35, 0.9); backdrop-filter: blur(10px);
            padding: 40px 25px; border-radius: 24px; border: 1px solid rgba(255, 193, 7, 0.2);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            max-width: 450px; width: 100%;
        }
        .icon-circle {
            width: 80px; height: 80px; background: linear-gradient(45deg, #4CAF50, #81C784);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 2.5rem; color: #fff;
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }
        h1 { font-size: 1.8rem; margin-bottom: 15px; color: #ffc107; font-weight: 800; }
        p { font-size: 1rem; color: #bcaaa4; line-height: 1.6; margin-bottom: 30px; }
        .highlight { color: #f8f1e7; font-weight: 600; }
        
        .btn-whatsapp {
            background: #25D366; color: #fff; border: none; padding: 18px 30px;
            border-radius: 50px; font-size: 1.1rem; font-weight: 800;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 10px; width: 100%; text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); transition: all 0.3s;
        }
        .btn-whatsapp:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(37, 211, 102, 0.4); }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-circle">
            <i class="fa-solid fa-check"></i>
        </div>
        <h1>PAGAMENTO RIUSCITO!</h1>
        <p>Il tuo ordine è stato saldato con successo.<br><br>
        <span class="highlight">Fai l'ultimo passo:</span> invia l'ordine alla cucina su WhatsApp per far avviare la preparazione!</p>
        
        <button class="btn-whatsapp" onclick="sendFinalWhatsApp()">
            <i class="fa-brands fa-whatsapp fa-xl"></i> AVVISA LA CUCINA
        </button>
    </div>

    <script>
        function sendFinalWhatsApp() {
            let orderMessage = localStorage.getItem('peterbun_order_message');
            
            if (!orderMessage) {
                alert("Non abbiamo trovato i dettagli dell'ordine in memoria. Chiama direttamente il locale per confermare!");
                return;
            }

            // 1. Pulisce il testo dai vecchi codici "%0A" (a capo grezzi) 
            // e li trasforma in reali a capo \n
            orderMessage = orderMessage.replace(/%0A/g, '\n');

            // 2. Crea il messaggio finale
            let finalMessage = "✅ *ORDINE PAGATO ONLINE (SumUp)*\n\n" + orderMessage;
            
            // INSERISCI QUI IL NUMERO DI PETER BUN
            const phoneNumber = "393751477928"; 
            
            // 3. LA MAGIA: Codifica in modo sicuro TUTTO il messaggio (inclusi gli spazi e le emoji)
            // in un formato perfettamente digeribile dai link web
            let urlSafeMessage = encodeURIComponent(finalMessage);
            
            // 4. Apri WhatsApp
            window.location.href = `https://wa.me/${phoneNumber}?text=${urlSafeMessage}`;
            
            // Opzionale: pulisce la memoria una volta inviato (rimuovi i commenti per attivarlo)
            // localStorage.removeItem('peterbun_order_message');
        }
    </script>
</body>
</html>
